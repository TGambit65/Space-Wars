<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wars 3000 - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('images/backgrounds/deepspace-dark.svg');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background-color: rgba(26, 26, 74, 0.9);
            border-radius: 10px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #8a2be2, #ff1493);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            color: #ffffff;
            font-weight: 500;
        }

        .text-muted {
            color: #d0d0d0 !important;
        }

        .register-link {
            color: #a065ff;
            text-decoration: underline;
            font-weight: 500;
        }

        .register-link:hover {
            color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-rocket fa-3x" style="color: #8a2be2;"></i>
            </div>
            <h1 class="login-title">Space Wars 3000</h1>
            <form id="login-form">
                <div class="mb-3">
                    <label for="login-username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="login-username" required>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="login-password" required>
                </div>
                <div id="login-error" class="text-danger mb-3"></div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <div class="text-center mt-3">
                    <small class="text-muted">Don't have an account? <a href="register.html" class="register-link">Register Now</a></small>
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted"><strong>🚀 Quick Demo Access:</strong> Username: <code>demo</code> | Password: <code>demo</code></small>
                </div>
                <div class="text-center mt-2">
                    <small class="text-muted">Or try: admin/spaceadmin, admin@test.com/testpassword, player@test.com/testpassword</small>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth-common.js"></script>
    <script src="js/demo-mode.js"></script>
    <script src="js/generate-token.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
