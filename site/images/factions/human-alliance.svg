  <!-- Armor lines -->
  <path d="M32,64 Q64,110 96,64" stroke="#fff" stroke-width="2" fill="none" opacity="0.25" />
  <path d="M44,44 Q64,24 84,44" stroke="#fff" stroke-width="2" fill="none" opacity="0.15" />
