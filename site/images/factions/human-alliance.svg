      <stop offset="0%" stop-color="#ffe0b2" />
      <stop offset="100%" stop-color="#b1885c" />
    </radialGradient>
    <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90caf9" />
