<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="metal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="100%" stop-color="#616161" />
    </radialGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4081" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Robot head -->
  <rect x="28" y="28" width="72" height="72" rx="24" fill="url(#metal)" stroke="#616161" stroke-width="3" />
  <!-- Eyes -->
  <ellipse cx="52" cy="68" rx="8" ry="8" fill="url(#eye)" />
  <ellipse cx="76" cy="68" rx="8" ry="8" fill="url(#eye)" />
  <!-- Mouth grill -->
  <rect x="54" y="88" width="20" height="8" rx="3" fill="#333" />
  <rect x="58" y="90" width="2" height="4" fill="#8a2be2" />
  <rect x="62" y="90" width="2" height="4" fill="#8a2be2" />
  <rect x="66" y="90" width="2" height="4" fill="#8a2be2" />
  <rect x="70" y="90" width="2" height="4" fill="#8a2be2" />
  <!-- Shadow -->
  <ellipse cx="64" cy="120" rx="32" ry="8" fill="url(#shadow)" />
  <!-- Circuit lines -->
  <path d="M40,40 Q32,64 64,64 Q96,64 88,40" stroke="#ff4081" stroke-width="2" fill="none" opacity="0.3" />
</svg>
