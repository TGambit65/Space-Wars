<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6fffb0" />
      <stop offset="100%" stop-color="#00695c" />
    </radialGradient>
    <linearGradient id="eyes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Alien head -->
  <ellipse cx="64" cy="70" rx="44" ry="54" fill="url(#skin)" stroke="#004d40" stroke-width="3" />
  <!-- Eyes -->
  <ellipse cx="48" cy="72" rx="12" ry="8" fill="url(#eyes)" />
  <ellipse cx="80" cy="72" rx="12" ry="8" fill="url(#eyes)" />
  <ellipse cx="48" cy="72" rx="6" ry="4" fill="#222" opacity="0.7" />
  <ellipse cx="80" cy="72" rx="6" ry="4" fill="#222" opacity="0.7" />
  <!-- Mouth -->
  <ellipse cx="64" cy="98" rx="12" ry="4" fill="#004d40" opacity="0.7" />
  <!-- Shadow -->
  <ellipse cx="64" cy="120" rx="32" ry="8" fill="url(#shadow)" />
  <!-- Forehead ridges -->
  <path d="M64,36 Q74,50 64,64 Q54,50 64,36" stroke="#00e676" stroke-width="2" fill="none" opacity="0.4" />
