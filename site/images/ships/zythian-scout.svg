<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="zythianPurple1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E24AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="organicShell1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CE93D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BA68C8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bioEnergy1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#AB47BC;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:0.2" />
    </radialGradient>
    <radialGradient id="neuralGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#E1BEE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  
  <!-- Whisper Seed - Bio-engineered reconnaissance organism -->
  <!-- Bio-energy field -->
  <ellipse cx="100" cy="100" rx="85" ry="80" fill="url(#bioEnergy1)"/>
  
  <!-- Main organic hull - insectoid/cellular structure -->
  <path d="M100 25 Q130 40 135 70 Q140 100 135 130 Q130 160 100 175 Q70 160 65 130 Q60 100 65 70 Q70 40 100 25 Z" 
        fill="url(#organicShell1)" stroke="#4A148C" stroke-width="2"/>
  
  <!-- Chameleonic skin segments -->
  <ellipse cx="85" cy="60" rx="12" ry="8" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="115" cy="60" rx="12" ry="8" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="85" cy="85" rx="10" ry="6" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="115" cy="85" rx="10" ry="6" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="85" cy="115" rx="10" ry="6" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="115" cy="115" rx="10" ry="6" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="85" cy="140" rx="12" ry="8" fill="#CE93D8" opacity="0.7"/>
  <ellipse cx="115" cy="140" rx="12" ry="8" fill="#CE93D8" opacity="0.7"/>
  
  <!-- Neural network core -->
  <circle cx="100" cy="100" r="20" fill="url(#neuralGlow)"/>
  <circle cx="100" cy="100" r="15" fill="#9C27B0" opacity="0.8"/>
  
  <!-- Neural pathways -->
  <path d="M100 85 Q85 95 85 100 Q85 105 100 115" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M100 85 Q115 95 115 100 Q115 105 100 115" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M85 100 Q100 85 115 100" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M85 100 Q100 115 115 100" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  
  <!-- Sensor organs (compound eyes) -->
  <circle cx="75" cy="75" r="8" fill="#4A148C"/>
  <circle cx="75" cy="75" r="5" fill="#8E24AA"/>
  <circle cx="72" cy="72" r="2" fill="#E1BEE7"/>
  
  <circle cx="125" cy="75" r="8" fill="#4A148C"/>
  <circle cx="125" cy="75" r="5" fill="#8E24AA"/>
  <circle cx="128" cy="72" r="2" fill="#E1BEE7"/>
  
  <!-- Bio-propulsion organs -->
  <ellipse cx="80" cy="150" rx="8" ry="15" fill="#7B1FA2"/>
  <ellipse cx="120" cy="150" rx="8" ry="15" fill="#7B1FA2"/>
  
  <!-- Bio-thrust emanations -->
  <ellipse cx="80" cy="165" rx="6" ry="12" fill="#AB47BC" opacity="0.6"/>
  <ellipse cx="120" cy="165" rx="6" ry="12" fill="#AB47BC" opacity="0.6"/>
  
  <!-- Stealth tendrils -->
  <path d="M70 50 Q50 45 45 30" stroke="#8E24AA" stroke-width="3" fill="none" opacity="0.5"/>
  <circle cx="45" cy="30" r="3" fill="#AB47BC" opacity="0.5"/>
  
  <path d="M130 50 Q150 45 155 30" stroke="#8E24AA" stroke-width="3" fill="none" opacity="0.5"/>
  <circle cx="155" cy="30" r="3" fill="#AB47BC" opacity="0.5"/>
  
  <!-- Psionic scanner array -->
  <path d="M100 30 Q90 20 85 15" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <circle cx="85" cy="15" r="2" fill="#E1BEE7"/>
  
  <path d="M100 30 Q100 20 100 10" stroke="#E1BEE7" stroke-width="3" fill="none"/>
  <circle cx="100" cy="10" r="3" fill="#E1BEE7"/>
  
  <path d="M100 30 Q110 20 115 15" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <circle cx="115" cy="15" r="2" fill="#E1BEE7"/>
  
  <!-- Bio-weapon secretion ports -->
  <circle cx="65" cy="100" r="4" fill="#4A148C"/>
  <circle cx="135" cy="100" r="4" fill="#4A148C"/>
  
  <!-- Organic ventilation/breathing slits -->
  <ellipse cx="90" cy="55" rx="2" ry="8" fill="#7B1FA2" opacity="0.6"/>
  <ellipse cx="110" cy="55" rx="2" ry="8" fill="#7B1FA2" opacity="0.6"/>
  <ellipse cx="90" cy="145" rx="2" ry="8" fill="#7B1FA2" opacity="0.6"/>
  <ellipse cx="110" cy="145" rx="2" ry="8" fill="#7B1FA2" opacity="0.6"/>
  
  <!-- Collective consciousness symbol -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.9"/>
  <text x="100" y="103" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#4A148C">ℤ</text>
</svg>