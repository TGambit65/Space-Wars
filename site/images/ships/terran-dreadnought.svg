<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="terranBlue3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terranMetal3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CFD8DC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B0BEC5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78909C;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="terranPower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <!-- Titan-class Dreadnought - Massive super-capital ship -->
  <!-- Power field -->
  <ellipse cx="100" cy="100" rx="95" ry="90" fill="url(#terranPower)"/>
  
  <!-- Main hull - massive structure -->
  <path d="M100 10 L140 30 L145 80 L150 120 L145 160 L130 185 L100 195 L70 185 L55 160 L50 120 L55 80 L60 30 Z" 
        fill="url(#terranMetal3)" stroke="#37474F" stroke-width="4"/>
  
  <!-- Heavy armor sections -->
  <rect x="65" y="40" width="70" height="20" fill="#607D8B" opacity="0.9"/>
  <rect x="65" y="65" width="70" height="20" fill="#607D8B" opacity="0.9"/>
  <rect x="65" y="90" width="70" height="20" fill="#607D8B" opacity="0.9"/>
  <rect x="65" y="115" width="70" height="20" fill="#607D8B" opacity="0.9"/>
  <rect x="65" y="140" width="70" height="20" fill="#607D8B" opacity="0.9"/>
  
  <!-- Command bridge -->
  <rect x="80" y="20" width="40" height="25" rx="8" fill="url(#terranBlue3)"/>
  <rect x="90" y="15" width="20" height="10" fill="#1976D2"/>
  
  <!-- Orbital strike cannon (main weapon) -->
  <rect x="92" y="160" width="16" height="35" fill="#263238"/>
  <ellipse cx="100" cy="195" rx="12" ry="8" fill="#37474F"/>
  
  <!-- Heavy weapon batteries -->
  <circle cx="45" cy="60" r="10" fill="#37474F"/>
  <rect x="40" y="50" width="10" height="15" fill="#455A64"/>
  
  <circle cx="155" cy="60" r="10" fill="#37474F"/>
  <rect x="150" y="50" width="10" height="15" fill="#455A64"/>
  
  <circle cx="45" cy="100" r="10" fill="#37474F"/>
  <rect x="40" y="90" width="10" height="15" fill="#455A64"/>
  
  <circle cx="155" cy="100" r="10" fill="#37474F"/>
  <rect x="150" y="90" width="10" height="15" fill="#455A64"/>
  
  <circle cx="45" cy="140" r="10" fill="#37474F"/>
  <rect x="40" y="130" width="10" height="15" fill="#455A64"/>
  
  <circle cx="155" cy="140" r="10" fill="#37474F"/>
  <rect x="150" y="130" width="10" height="15" fill="#455A64"/>
  
  <!-- Engine banks -->
  <rect x="60" y="165" width="25" height="25" rx="5" fill="#263238"/>
  <rect x="115" y="165" width="25" height="25" rx="5" fill="#263238"/>
  
  <!-- Engine glow -->
  <ellipse cx="72.5" cy="190" rx="12" ry="10" fill="#FF5722" opacity="1"/>
  <ellipse cx="127.5" cy="190" rx="12" ry="10" fill="#FF5722" opacity="1"/>
  
  <!-- Secondary engines -->
  <circle cx="55" cy="180" r="5" fill="#FF8A65" opacity="0.8"/>
  <circle cx="145" cy="180" r="5" fill="#FF8A65" opacity="0.8"/>
  
  <!-- Federation fleet command emblem -->
  <circle cx="100" cy="100" r="20" fill="white" opacity="0.95"/>
  <text x="100" y="107" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#0D47A1">TF</text>
  
  <!-- Fleet command arrays -->
  <line x1="70" y1="15" x2="50" y2="5" stroke="#1976D2" stroke-width="2"/>
  <circle cx="50" cy="5" r="3" fill="#64B5F6"/>
  
  <line x1="130" y1="15" x2="150" y2="5" stroke="#1976D2" stroke-width="2"/>
  <circle cx="150" cy="5" r="3" fill="#64B5F6"/>
  
  <line x1="100" y1="10" x2="100" y2="0" stroke="#1976D2" stroke-width="3"/>
  <circle cx="100" cy="0" r="4" fill="#64B5F6"/>
</svg>