<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 160 100" width="160" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="hull" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#90caf9" />
      <stop offset="100%" stop-color="#0d47a1" />
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8a2be2" stop-opacity="0.2" />
    </linearGradient>
    <radialGradient id="engine" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.5" />
    </radialGradient>
  </defs>
  <!-- Main hull -->
  <ellipse cx="80" cy="50" rx="48" ry="24" fill="url(#hull)" stroke="#1976d2" stroke-width="3" />
  <!-- Cockpit -->
  <ellipse cx="80" cy="50" rx="14" ry="10" fill="#fff" stroke="#8a2be2" stroke-width="2" opacity="0.7" />
  <!-- Wings -->
  <polygon points="32,50 0,90 32,70" fill="#8a2be2" opacity="0.8" />
  <polygon points="128,50 160,90 128,70" fill="#8a2be2" opacity="0.8" />
  <!-- Engine glow -->
  <ellipse cx="80" cy="86" rx="16" ry="6" fill="url(#engine)" />
  <!-- Details -->
  <rect x="75" y="30" width="10" height="16" rx="3" fill="#fff" opacity="0.15" />
  <rect x="65" y="62" width="30" height="6" rx="2" fill="#fff" opacity="0.07" />
  <ellipse cx="80" cy="50" rx="48" ry="24" fill="url(#glow)" opacity="0.2" />
</svg>
