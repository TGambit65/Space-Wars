<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="terranBlue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terranMetal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BDBDBD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9E9E9E;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="terranShield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Sovereign Battleship - Heavy armored warship -->
  <!-- Shield bubble -->
  <ellipse cx="100" cy="100" rx="90" ry="85" fill="url(#terranShield)"/>
  
  <!-- Main hull -->
  <path d="M100 20 L130 50 L135 140 L125 170 L100 180 L75 170 L65 140 L70 50 Z" 
        fill="url(#terranMetal2)" stroke="#424242" stroke-width="3"/>
  
  <!-- Armor plating -->
  <rect x="75" y="60" width="50" height="15" fill="#757575" opacity="0.8"/>
  <rect x="75" y="80" width="50" height="15" fill="#757575" opacity="0.8"/>
  <rect x="75" y="100" width="50" height="15" fill="#757575" opacity="0.8"/>
  
  <!-- Bridge -->
  <rect x="85" y="40" width="30" height="20" rx="5" fill="url(#terranBlue2)"/>
  
  <!-- Weapon turrets -->
  <circle cx="60" cy="70" r="8" fill="#424242"/>
  <rect x="56" y="62" width="8" height="12" fill="#616161"/>
  
  <circle cx="140" cy="70" r="8" fill="#424242"/>
  <rect x="136" y="62" width="8" height="12" fill="#616161"/>
  
  <circle cx="60" cy="110" r="8" fill="#424242"/>
  <rect x="56" y="102" width="8" height="12" fill="#616161"/>
  
  <circle cx="140" cy="110" r="8" fill="#424242"/>
  <rect x="136" y="102" width="8" height="12" fill="#616161"/>
  
  <!-- Main engines -->
  <rect x="70" y="140" width="20" height="30" rx="5" fill="#424242"/>
  <rect x="110" y="140" width="20" height="30" rx="5" fill="#424242"/>
  
  <!-- Engine glow -->
  <ellipse cx="80" cy="170" rx="10" ry="15" fill="#FF6F00" opacity="0.9"/>
  <ellipse cx="120" cy="170" rx="10" ry="15" fill="#FF6F00" opacity="0.9"/>
  
  <!-- Federation emblem -->
  <circle cx="100" cy="90" r="15" fill="white" opacity="0.9"/>
  <text x="100" y="96" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565C0">TF</text>
  
  <!-- Command antenna -->
  <line x1="100" y1="20" x2="100" y2="10" stroke="#1565C0" stroke-width="3"/>
  <circle cx="100" cy="10" r="3" fill="#1E88E5"/>
</svg>