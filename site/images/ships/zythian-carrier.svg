<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="zythianPurple2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E24AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="organicShell2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CE93D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BA68C8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bioEnergy2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#AB47BC;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:0.1" />
    </radialGradient>
    <linearGradient id="spawningChamber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Hive Mother - Massive bio-ship with spawning chambers -->
  <!-- Bio-energy field -->
  <ellipse cx="100" cy="100" rx="95" ry="90" fill="url(#bioEnergy2)"/>
  
  <!-- Main organic hull - mothership structure -->
  <path d="M100 20 L140 40 L150 80 L155 120 L150 160 L130 185 L100 190 L70 185 L50 160 L45 120 L50 80 L60 40 Z" 
        fill="url(#organicShell2)" stroke="#4A148C" stroke-width="3"/>
  
  <!-- Spawning chambers along the sides -->
  <ellipse cx="70" cy="70" rx="15" ry="20" fill="url(#spawningChamber)"/>
  <ellipse cx="130" cy="70" rx="15" ry="20" fill="url(#spawningChamber)"/>
  <ellipse cx="70" cy="110" rx="15" ry="20" fill="url(#spawningChamber)"/>
  <ellipse cx="130" cy="110" rx="15" ry="20" fill="url(#spawningChamber)"/>
  <ellipse cx="70" cy="150" rx="15" ry="20" fill="url(#spawningChamber)"/>
  <ellipse cx="130" cy="150" rx="15" ry="20" fill="url(#spawningChamber)"/>
  
  <!-- Spawning chamber details -->
  <circle cx="70" cy="70" r="8" fill="#4A148C" opacity="0.7"/>
  <circle cx="130" cy="70" r="8" fill="#4A148C" opacity="0.7"/>
  <circle cx="70" cy="110" r="8" fill="#4A148C" opacity="0.7"/>
  <circle cx="130" cy="110" r="8" fill="#4A148C" opacity="0.7"/>
  <circle cx="70" cy="150" r="8" fill="#4A148C" opacity="0.7"/>
  <circle cx="130" cy="150" r="8" fill="#4A148C" opacity="0.7"/>
  
  <!-- Central birthing chamber -->
  <ellipse cx="100" cy="100" rx="25" ry="40" fill="#7B1FA2" opacity="0.8"/>
  <ellipse cx="100" cy="100" rx="20" ry="35" fill="#8E24AA" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="15" ry="25" fill="#9C27B0" opacity="0.8"/>
  
  <!-- Organic spawn tubes -->
  <path d="M85 100 Q70 90 55 80" stroke="#AB47BC" stroke-width="4" fill="none"/>
  <path d="M115 100 Q130 90 145 80" stroke="#AB47BC" stroke-width="4" fill="none"/>
  <path d="M85 90 Q70 100 55 110" stroke="#AB47BC" stroke-width="4" fill="none"/>
  <path d="M115 90 Q130 100 145 110" stroke="#AB47BC" stroke-width="4" fill="none"/>
  <path d="M85 110 Q70 120 55 140" stroke="#AB47BC" stroke-width="4" fill="none"/>
  <path d="M115 110 Q130 120 145 140" stroke="#AB47BC" stroke-width="4" fill="none"/>
  
  <!-- Emerging drones/fighters -->
  <circle cx="40" cy="75" r="4" fill="#E1BEE7"/>
  <circle cx="42" cy="73" r="2" fill="#8E24AA"/>
  
  <circle cx="160" cy="75" r="4" fill="#E1BEE7"/>
  <circle cx="158" cy="73" r="2" fill="#8E24AA"/>
  
  <circle cx="40" cy="105" r="4" fill="#E1BEE7"/>
  <circle cx="42" cy="103" r="2" fill="#8E24AA"/>
  
  <circle cx="160" cy="105" r="4" fill="#E1BEE7"/>
  <circle cx="158" cy="103" r="2" fill="#8E24AA"/>
  
  <!-- Hive mind coordination array -->
  <rect x="85" y="30" width="30" height="15" rx="7" fill="url(#zythianPurple2)"/>
  <circle cx="90" cy="37.5" r="3" fill="#E1BEE7"/>
  <circle cx="100" cy="37.5" r="3" fill="#E1BEE7"/>
  <circle cx="110" cy="37.5" r="3" fill="#E1BEE7"/>
  
  <!-- Bio-propulsion clusters -->
  <ellipse cx="75" cy="170" rx="10" ry="18" fill="#7B1FA2"/>
  <ellipse cx="100" cy="175" rx="12" ry="20" fill="#7B1FA2"/>
  <ellipse cx="125" cy="170" rx="10" ry="18" fill="#7B1FA2"/>
  
  <!-- Bio-thrust emanations -->
  <ellipse cx="75" cy="185" rx="8" ry="15" fill="#AB47BC" opacity="0.6"/>
  <ellipse cx="100" cy="190" rx="10" ry="18" fill="#AB47BC" opacity="0.6"/>
  <ellipse cx="125" cy="185" rx="8" ry="15" fill="#AB47BC" opacity="0.6"/>
  
  <!-- Organic weapon ports -->
  <circle cx="50" cy="60" r="6" fill="#4A148C"/>
  <circle cx="150" cy="60" r="6" fill="#4A148C"/>
  
  <!-- Adaptive carapace segments -->
  <rect x="60" y="50" width="80" height="8" rx="4" fill="#BA68C8" opacity="0.7"/>
  <rect x="60" y="65" width="80" height="8" rx="4" fill="#BA68C8" opacity="0.7"/>
  <rect x="60" y="127" width="80" height="8" rx="4" fill="#BA68C8" opacity="0.7"/>
  <rect x="60" y="142" width="80" height="8" rx="4" fill="#BA68C8" opacity="0.7"/>
  
  <!-- Neural network links -->
  <path d="M100 80 Q85 85 70 80" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M100 80 Q115 85 130 80" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M100 120 Q85 115 70 120" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  <path d="M100 120 Q115 115 130 120" stroke="#E1BEE7" stroke-width="2" fill="none"/>
  
  <!-- Sensor clusters -->
  <circle cx="60" cy="45" r="5" fill="#8E24AA"/>
  <circle cx="140" cy="45" r="5" fill="#8E24AA"/>
  <circle cx="58" cy="43" r="2" fill="#E1BEE7"/>
  <circle cx="142" cy="43" r="2" fill="#E1BEE7"/>
  
  <!-- Collective consciousness symbol -->
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.9"/>
  <text x="100" y="106" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#4A148C">♀</text>
  
  <!-- Hive mind emanations -->
  <circle cx="100" cy="65" r="2" fill="#E1BEE7" opacity="0.8"/>
  <circle cx="100" cy="135" r="2" fill="#E1BEE7" opacity="0.8"/>
  <circle cx="75" cy="100" r="2" fill="#E1BEE7" opacity="0.8"/>
  <circle cx="125" cy="100" r="2" fill="#E1BEE7" opacity="0.8"/>
</svg>