<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#121212" />
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#8a2be2" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Planet -->
  <circle cx="32" cy="20" r="16" fill="url(#planetGlow)" stroke="#4a148c" stroke-width="2" />
  <!-- Rings -->
  <ellipse cx="32" cy="21" rx="20" ry="6" fill="none" stroke="#ff4081" stroke-width="2" opacity="0.7" />
  <ellipse cx="32" cy="21" rx="16" ry="4" fill="none" stroke="#fff" stroke-width="1" opacity="0.4" />
  <!-- Beam -->
  <rect x="60" y="9" width="38" height="4" rx="2" fill="url(#beam)" />
  <!-- SW3000 text -->
  <text x="60" y="30" font-family="'Exo 2', 'Roboto', sans-serif" font-size="20" font-weight="bold" fill="#fff">SW3000</text>
</svg>
