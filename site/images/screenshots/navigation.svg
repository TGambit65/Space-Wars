<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" />
  
  <!-- Space Background with Stars -->
  <g id="stars">
    <circle cx="50" cy="50" r="1" fill="white" opacity="0.8" />
    <circle cx="150" cy="100" r="1" fill="white" opacity="0.6" />
    <circle cx="250" cy="150" r="1" fill="white" opacity="0.7" />
    <circle cx="350" cy="200" r="1" fill="white" opacity="0.9" />
    <circle cx="450" cy="250" r="1" fill="white" opacity="0.7" />
    <circle cx="550" cy="300" r="1" fill="white" opacity="0.8" />
    <circle cx="650" cy="350" r="1" fill="white" opacity="0.6" />
    <circle cx="750" cy="400" r="1" fill="white" opacity="0.7" />
    <circle cx="100" cy="450" r="1" fill="white" opacity="0.9" />
    <circle cx="200" cy="400" r="1" fill="white" opacity="0.6" />
    <circle cx="300" cy="350" r="1" fill="white" opacity="0.8" />
    <circle cx="400" cy="300" r="1" fill="white" opacity="0.7" />
    <circle cx="500" cy="250" r="1" fill="white" opacity="0.9" />
    <circle cx="600" cy="200" r="1" fill="white" opacity="0.6" />
    <circle cx="700" cy="150" r="1" fill="white" opacity="0.8" />
    <circle cx="800" cy="100" r="1" fill="white" opacity="0.7" />
  </g>
  
  <!-- Galaxy Map -->
  <g id="galaxy-map">
    <!-- Galaxy Spiral Arms -->
    <path d="M400,250 C500,150 550,200 600,150 C650,100 700,150 750,100" stroke="#8a2be2" stroke-width="2" fill="none" opacity="0.5" />
    <path d="M400,250 C300,350 250,300 200,350 C150,400 100,350 50,400" stroke="#8a2be2" stroke-width="2" fill="none" opacity="0.5" />
    <path d="M400,250 C300,150 250,200 200,150 C150,100 100,150 50,100" stroke="#8a2be2" stroke-width="2" fill="none" opacity="0.5" />
    <path d="M400,250 C500,350 550,300 600,350 C650,400 700,350 750,400" stroke="#8a2be2" stroke-width="2" fill="none" opacity="0.5" />
    
    <!-- Star Systems -->
    <circle cx="400" cy="250" r="8" fill="#ff9800" />
    <circle cx="450" cy="200" r="4" fill="#4dabf7" />
    <circle cx="350" cy="300" r="5" fill="#4caf50" />
    <circle cx="500" cy="300" r="3" fill="#f44336" />
    <circle cx="300" cy="200" r="6" fill="#9c27b0" />
    <circle cx="550" cy="250" r="4" fill="#ffeb3b" />
    <circle cx="250" cy="250" r="3" fill="#2196f3" />
    <circle cx="600" cy="200" r="5" fill="#e91e63" />
    <circle cx="200" cy="300" r="4" fill="#00bcd4" />
    <circle cx="650" cy="300" r="3" fill="#cddc39" />
    
    <!-- Current Location Indicator -->
    <circle cx="400" cy="250" r="15" fill="none" stroke="#ffffff" stroke-width="2" />
    <circle cx="400" cy="250" r="12" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" />
    
    <!-- Navigation Interface -->
    <rect x="50" y="50" width="250" height="400" rx="10" fill="rgba(26, 31, 42, 0.8)" stroke="#8a2be2" stroke-width="2" />
    
    <text x="175" y="80" font-family="Arial" font-size="18" fill="#ffffff" text-anchor="middle">NAVIGATION CONSOLE</text>
    <text x="175" y="110" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Sector Map</text>
    
    <!-- System List -->
    <rect x="70" y="130" width="210" height="40" rx="5" fill="rgba(138, 43, 226, 0.2)" stroke="#8a2be2" stroke-width="1" />
    <text x="90" y="155" font-family="Arial" font-size="14" fill="#ffffff">Alpha Centauri</text>
    <text x="250" y="155" font-family="Arial" font-size="14" fill="#4caf50" text-anchor="end">4.3 LY</text>
    
    <rect x="70" y="180" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
    <text x="90" y="205" font-family="Arial" font-size="14" fill="#ffffff">Sirius System</text>
    <text x="250" y="205" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="end">8.6 LY</text>
    
    <rect x="70" y="230" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
    <text x="90" y="255" font-family="Arial" font-size="14" fill="#ffffff">Procyon Sector</text>
    <text x="250" y="255" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="end">11.4 LY</text>
    
    <rect x="70" y="280" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
    <text x="90" y="305" font-family="Arial" font-size="14" fill="#ffffff">Epsilon Eridani</text>
    <text x="250" y="305" font-family="Arial" font-size="14" fill="#f44336" text-anchor="end">10.5 LY</text>
    
    <!-- Navigation Controls -->
    <rect x="70" y="350" width="210" height="40" rx="20" fill="#8a2be2" />
    <text x="175" y="375" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">SET COURSE</text>
    
    <!-- Ship Position -->
    <g transform="translate(400, 250)">
      <path d="M0,-10 L5,10 L0,5 L-5,10 Z" fill="#ffffff" />
    </g>
  </g>
</svg>
