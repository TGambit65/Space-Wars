<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" />
  
  <!-- Space Background with Stars -->
  <g id="stars">
    <circle cx="100" cy="50" r="1" fill="white" opacity="0.8" />
    <circle cx="200" cy="150" r="1" fill="white" opacity="0.6" />
    <circle cx="300" cy="80" r="1" fill="white" opacity="0.7" />
    <circle cx="400" cy="200" r="1" fill="white" opacity="0.9" />
    <circle cx="500" cy="120" r="1" fill="white" opacity="0.7" />
    <circle cx="600" cy="250" r="1" fill="white" opacity="0.8" />
    <circle cx="700" cy="180" r="1" fill="white" opacity="0.6" />
    <circle cx="150" cy="300" r="1" fill="white" opacity="0.7" />
    <circle cx="250" cy="350" r="1" fill="white" opacity="0.9" />
    <circle cx="350" cy="400" r="1" fill="white" opacity="0.6" />
    <circle cx="450" cy="450" r="1" fill="white" opacity="0.8" />
    <circle cx="550" cy="350" r="1" fill="white" opacity="0.7" />
    <circle cx="650" cy="400" r="1" fill="white" opacity="0.9" />
    <circle cx="750" cy="450" r="1" fill="white" opacity="0.6" />
  </g>
  
  <!-- Combat Scene -->
  <g id="combat-scene">
    <!-- Player Ship -->
    <g transform="translate(200, 250) rotate(-15)">
      <path d="M0,-30 L15,-10 L15,20 L0,30 L-15,20 L-15,-10 Z" fill="#4dabf7" stroke="#ffffff" stroke-width="1" />
      <rect x="-5" y="-40" width="10" height="15" fill="#4dabf7" stroke="#ffffff" stroke-width="1" />
      <circle cx="0" cy="0" r="10" fill="#8a2be2" stroke="#ffffff" stroke-width="1" />
    </g>
    
    <!-- Enemy Ship -->
    <g transform="translate(600, 250) rotate(195)">
      <path d="M0,-25 L20,-5 L20,15 L0,25 L-20,15 L-20,-5 Z" fill="#ff5252" stroke="#ffffff" stroke-width="1" />
      <rect x="-7" y="-35" width="14" height="12" fill="#ff5252" stroke="#ffffff" stroke-width="1" />
      <circle cx="0" cy="0" r="8" fill="#f44336" stroke="#ffffff" stroke-width="1" />
    </g>
    
    <!-- Laser Beams -->
    <line x1="215" y1="245" x2="580" y2="255" stroke="#4dabf7" stroke-width="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.5s" repeatCount="indefinite" />
    </line>
    
    <line x1="585" y1="255" x2="220" y2="245" stroke="#ff5252" stroke-width="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.7s" repeatCount="indefinite" />
    </line>
    
    <!-- Explosions -->
    <circle cx="230" cy="240" r="10" fill="#ff9800" opacity="0.7">
      <animate attributeName="r" values="5;15;5" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="570" cy="260" r="8" fill="#ff9800" opacity="0.7">
      <animate attributeName="r" values="4;12;4" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Combat Interface -->
  <rect x="50" y="50" width="250" height="400" rx="10" fill="rgba(26, 31, 42, 0.8)" stroke="#8a2be2" stroke-width="2" />
  
  <text x="175" y="80" font-family="Arial" font-size="18" fill="#ffffff" text-anchor="middle">COMBAT SYSTEM</text>
  <text x="175" y="110" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Tactical Battle</text>
  
  <!-- Ship Status -->
  <rect x="70" y="130" width="210" height="100" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="175" y="150" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">YOUR SHIP</text>
  
  <!-- Health Bar -->
  <rect x="80" y="165" width="190" height="15" rx="3" fill="rgba(0, 0, 0, 0.5)" />
  <rect x="80" y="165" width="133" height="15" rx="3" fill="#4caf50" />
  <text x="175" y="177" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">HULL: 70%</text>
  
  <!-- Shield Bar -->
  <rect x="80" y="190" width="190" height="15" rx="3" fill="rgba(0, 0, 0, 0.5)" />
  <rect x="80" y="190" width="95" height="15" rx="3" fill="#2196f3" />
  <text x="175" y="202" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">SHIELDS: 50%</text>
  
  <!-- Energy Bar -->
  <rect x="80" y="215" width="190" height="15" rx="3" fill="rgba(0, 0, 0, 0.5)" />
  <rect x="80" y="215" width="152" height="15" rx="3" fill="#ff9800" />
  <text x="175" y="227" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">ENERGY: 80%</text>
  
  <!-- Enemy Status -->
  <rect x="70" y="240" width="210" height="100" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="175" y="260" font-family="Arial" font-size="14" fill="#f44336" text-anchor="middle">ENEMY SHIP</text>
  
  <!-- Enemy Health Bar -->
  <rect x="80" y="275" width="190" height="15" rx="3" fill="rgba(0, 0, 0, 0.5)" />
  <rect x="80" y="275" width="95" height="15" rx="3" fill="#f44336" />
  <text x="175" y="287" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">HULL: 50%</text>
  
  <!-- Enemy Shield Bar -->
  <rect x="80" y="300" width="190" height="15" rx="3" fill="rgba(0, 0, 0, 0.5)" />
  <rect x="80" y="300" width="38" height="15" rx="3" fill="#2196f3" />
  <text x="175" y="312" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">SHIELDS: 20%</text>
  
  <!-- Combat Actions -->
  <rect x="70" y="350" width="100" height="40" rx="5" fill="rgba(138, 43, 226, 0.2)" stroke="#8a2be2" stroke-width="1" />
  <text x="120" y="375" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">ATTACK</text>
  
  <rect x="180" y="350" width="100" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="230" y="375" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">DEFEND</text>
</svg>
