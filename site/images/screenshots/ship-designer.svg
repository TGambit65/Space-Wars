<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" />
  
  <!-- Ship Designer Interface -->
  <rect x="50" y="50" width="700" height="400" rx="10" fill="#1a1f2a" stroke="#8a2be2" stroke-width="2" />
  
  <!-- Left Panel - Ship Types -->
  <rect x="70" y="80" width="180" height="350" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="160" y="110" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">SHIP TYPES</text>
  
  <!-- Ship Type Items -->
  <rect x="80" y="130" width="160" height="40" rx="5" fill="#8a2be2" opacity="0.2" stroke="#8a2be2" stroke-width="1" />
  <text x="160" y="155" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Fighter</text>
  
  <rect x="80" y="180" width="160" height="40" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="160" y="205" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Cruiser</text>
  
  <rect x="80" y="230" width="160" height="40" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="160" y="255" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Battleship</text>
  
  <rect x="80" y="280" width="160" height="40" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="160" y="305" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Carrier</text>
  
  <rect x="80" y="330" width="160" height="40" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="160" y="355" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Explorer</text>
  
  <!-- Main Panel - Ship Visualization -->
  <rect x="270" y="80" width="300" height="250" rx="5" fill="#0a0d14" stroke="#2d3748" stroke-width="1" />
  
  <!-- Ship Visualization -->
  <path d="M420 200 L380 250 L340 230 L340 170 L380 150 L420 200 Z" fill="#4dabf7" stroke="#ffffff" stroke-width="1" />
  <path d="M420 200 L460 230 L500 250 L460 170 L420 200 Z" fill="#4dabf7" stroke="#ffffff" stroke-width="1" />
  <circle cx="420" cy="200" r="20" fill="#8a2be2" stroke="#ffffff" stroke-width="1" />
  
  <!-- Stats Panel -->
  <rect x="270" y="340" width="300" height="90" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="290" y="365" font-family="Arial" font-size="14" fill="#ffffff">Speed: 85</text>
  <text x="290" y="390" font-family="Arial" font-size="14" fill="#ffffff">Armor: 60</text>
  <text x="290" y="415" font-family="Arial" font-size="14" fill="#ffffff">Weapons: 75</text>
  
  <text x="450" y="365" font-family="Arial" font-size="14" fill="#ffffff">Shields: 70</text>
  <text x="450" y="390" font-family="Arial" font-size="14" fill="#ffffff">Cargo: 40</text>
  <text x="450" y="415" font-family="Arial" font-size="14" fill="#ffffff">Energy: 90</text>
  
  <!-- Right Panel - Components -->
  <rect x="590" y="80" width="180" height="350" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="680" y="110" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">COMPONENTS</text>
  
  <!-- Component Categories -->
  <rect x="600" y="130" width="160" height="30" rx="5" fill="#8a2be2" opacity="0.2" stroke="#8a2be2" stroke-width="1" />
  <text x="680" y="150" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Weapons</text>
  
  <rect x="600" y="170" width="160" height="30" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="680" y="190" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Shields</text>
  
  <rect x="600" y="210" width="160" height="30" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="680" y="230" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Engines</text>
  
  <rect x="600" y="250" width="160" height="30" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="680" y="270" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Power Cores</text>
  
  <rect x="600" y="290" width="160" height="30" rx="5" fill="#131822" stroke="#2d3748" stroke-width="1" />
  <text x="680" y="310" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">Special Systems</text>
  
  <!-- Save Button -->
  <rect x="600" y="380" width="160" height="40" rx="20" fill="#8a2be2" />
  <text x="680" y="405" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">SAVE DESIGN</text>
</svg>
