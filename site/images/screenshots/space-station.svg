<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" />
  
  <!-- Space Background with Stars -->
  <g id="stars">
    <circle cx="100" cy="50" r="1" fill="white" opacity="0.8" />
    <circle cx="200" cy="150" r="1" fill="white" opacity="0.6" />
    <circle cx="300" cy="80" r="1" fill="white" opacity="0.7" />
    <circle cx="400" cy="200" r="1" fill="white" opacity="0.9" />
    <circle cx="500" cy="120" r="1" fill="white" opacity="0.7" />
    <circle cx="600" cy="250" r="1" fill="white" opacity="0.8" />
    <circle cx="700" cy="180" r="1" fill="white" opacity="0.6" />
    <circle cx="150" cy="300" r="1" fill="white" opacity="0.7" />
    <circle cx="250" cy="350" r="1" fill="white" opacity="0.9" />
    <circle cx="350" cy="400" r="1" fill="white" opacity="0.6" />
    <circle cx="450" cy="450" r="1" fill="white" opacity="0.8" />
    <circle cx="550" cy="350" r="1" fill="white" opacity="0.7" />
    <circle cx="650" cy="400" r="1" fill="white" opacity="0.9" />
    <circle cx="750" cy="450" r="1" fill="white" opacity="0.6" />
  </g>
  
  <!-- Planet -->
  <circle cx="400" cy="250" r="200" fill="url(#planetGradient)" />
  
  <!-- Planet Gradient -->
  <defs>
    <radialGradient id="planetGradient" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#1e88e5" />
      <stop offset="70%" stop-color="#0d47a1" />
      <stop offset="100%" stop-color="#051d40" />
    </radialGradient>
  </defs>
  
  <!-- Space Station -->
  <g transform="translate(500, 150) rotate(30)">
    <rect x="-60" y="-10" width="120" height="20" fill="#455a64" stroke="#78909c" stroke-width="1" />
    <rect x="-50" y="-30" width="100" height="60" fill="#263238" stroke="#78909c" stroke-width="1" />
    <rect x="-40" y="-20" width="80" height="40" fill="#1a237e" stroke="#3949ab" stroke-width="1" opacity="0.7" />
    <rect x="-30" y="30" width="60" height="10" fill="#455a64" stroke="#78909c" stroke-width="1" />
    <rect x="-30" y="-40" width="60" height="10" fill="#455a64" stroke="#78909c" stroke-width="1" />
    <circle cx="-20" cy="0" r="5" fill="#ff9800" />
    <circle cx="20" cy="0" r="5" fill="#ff9800" />
  </g>
  
  <!-- Ships Docked -->
  <g transform="translate(520, 180) rotate(45)">
    <path d="M0,0 L10,5 L0,10 L-10,5 Z" fill="#4dabf7" stroke="#ffffff" stroke-width="0.5" />
  </g>
  
  <g transform="translate(480, 130) rotate(-15)">
    <path d="M0,0 L15,7 L0,14 L-15,7 Z" fill="#ff5252" stroke="#ffffff" stroke-width="0.5" />
  </g>
  
  <!-- Trading Interface Overlay -->
  <rect x="50" y="50" width="250" height="400" rx="10" fill="rgba(26, 31, 42, 0.8)" stroke="#8a2be2" stroke-width="2" />
  
  <text x="175" y="80" font-family="Arial" font-size="18" fill="#ffffff" text-anchor="middle">SPACE STATION</text>
  <text x="175" y="110" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Trading Hub</text>
  
  <!-- Commodity List -->
  <rect x="70" y="130" width="210" height="40" rx="5" fill="rgba(138, 43, 226, 0.2)" stroke="#8a2be2" stroke-width="1" />
  <text x="90" y="155" font-family="Arial" font-size="14" fill="#ffffff">Quantum Crystals</text>
  <text x="250" y="155" font-family="Arial" font-size="14" fill="#4caf50" text-anchor="end">↑ 1250¢</text>
  
  <rect x="70" y="180" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="90" y="205" font-family="Arial" font-size="14" fill="#ffffff">Exotic Matter</text>
  <text x="250" y="205" font-family="Arial" font-size="14" fill="#f44336" text-anchor="end">↓ 890¢</text>
  
  <rect x="70" y="230" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="90" y="255" font-family="Arial" font-size="14" fill="#ffffff">Fusion Cells</text>
  <text x="250" y="255" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="end">= 1500¢</text>
  
  <rect x="70" y="280" width="210" height="40" rx="5" fill="rgba(26, 31, 42, 0.8)" stroke="#2d3748" stroke-width="1" />
  <text x="90" y="305" font-family="Arial" font-size="14" fill="#ffffff">Rare Minerals</text>
  <text x="250" y="305" font-family="Arial" font-size="14" fill="#4caf50" text-anchor="end">↑ 2100¢</text>
  
  <!-- Trade Buttons -->
  <rect x="70" y="350" width="95" height="40" rx="20" fill="#4caf50" />
  <text x="117" y="375" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">BUY</text>
  
  <rect x="185" y="350" width="95" height="40" rx="20" fill="#f44336" />
  <text x="232" y="375" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">SELL</text>
</svg>
