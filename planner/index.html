<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Wars 3000 - Game Design Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1e;--card:#111133;--border:#1a1a4e;--accent:#00ffff;--orange:#ff6600;--text:#e0e0e0;--muted:#666;--red:#f44;--green:#4c4;--purple:#a78bfa;--yellow:#ffc107}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.6}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.app{display:flex;min-height:100vh}
.sidebar{width:280px;background:#080818;border-right:1px solid var(--border);position:fixed;height:100vh;overflow-y:auto;z-index:10}
.main{margin-left:280px;flex:1;padding:2rem 3rem;max-width:1100px}

.sidebar-header{padding:1.5rem;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.2rem;color:var(--accent);letter-spacing:2px}
.sidebar-header p{font-size:.7rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:3px}
.nav-section{padding:.75rem 0}
.nav-section-title{padding:.5rem 1.5rem;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 1.5rem;font-size:.85rem;color:#999;cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(0,255,255,.04);color:#ccc}
.nav-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-exists{background:var(--green)}.dot-new{background:var(--orange)}.dot-planned{background:var(--yellow)}
.nav-item .count{margin-left:auto;font-size:.7rem;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:8px;color:var(--muted)}

.section{margin-bottom:3rem;scroll-margin-top:2rem}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.section-header h2{font-size:1.4rem;color:#fff}
.badge{font-size:.6rem;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.badge-exists{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3)}
.badge-new{background:rgba(255,102,0,.15);color:var(--orange);border:1px solid rgba(255,102,0,.3)}
.badge-planned{background:rgba(255,193,7,.15);color:var(--yellow);border:1px solid rgba(255,193,7,.3)}

.feature{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem;transition:border-color .2s}
.feature:hover{border-color:rgba(0,255,255,.2)}
.feature-title{font-size:1rem;color:#fff;font-weight:600}
.feature-summary{font-size:.85rem;color:#aaa;margin-top:.4rem;line-height:1.6}
.feature-meta{display:flex;gap:8px;margin-top:.6rem;flex-wrap:wrap;align-items:center}
.tag{font-size:.7rem;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.06)}
.tag-pve{color:#4caf50;border-color:rgba(76,175,80,.2);background:rgba(76,175,80,.06)}
.tag-pvp{color:#f44336;border-color:rgba(244,67,54,.2);background:rgba(244,67,54,.06)}
.tag-store{color:var(--orange);border-color:rgba(255,102,0,.2);background:rgba(255,102,0,.06)}
.tag-backend{color:var(--purple);border-color:rgba(167,139,250,.2);background:rgba(167,139,250,.06)}
.tag-frontend{color:var(--accent);border-color:rgba(0,255,255,.2);background:rgba(0,255,255,.06)}
.details-link{font-size:.75rem;color:var(--accent);cursor:pointer;opacity:.8;margin-left:auto;padding:3px 10px;border:1px solid rgba(0,255,255,.25);border-radius:4px;transition:all .15s}
.details-link:hover{opacity:1;background:rgba(0,255,255,.08)}

.workflow{display:flex;gap:4px;align-items:center;margin-top:.5rem;flex-wrap:wrap}
.wf-step{font-size:.7rem;padding:3px 8px;border-radius:3px;background:rgba(0,255,255,.06);border:1px solid rgba(0,255,255,.15);color:var(--accent)}
.wf-arrow{color:var(--muted);font-size:.7rem}

/* Comments (inline on cards) */
.comments-toggle{font-size:.8rem;color:var(--accent);cursor:pointer;margin-top:.75rem;display:inline-flex;align-items:center;gap:4px;opacity:.7}
.comments-toggle:hover{opacity:1}
.comments-area{margin-top:.75rem;display:none}
.comments-area.open{display:block}
.comment{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:.75rem;margin-bottom:.5rem}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.comment-author{font-size:.75rem;color:var(--accent);font-weight:600}
.comment-time{font-size:.65rem;color:var(--muted)}
.comment-text{font-size:.82rem;color:#bbb;white-space:pre-wrap}
.comment-delete{font-size:.65rem;color:var(--red);cursor:pointer;opacity:.5;margin-left:8px}
.comment-delete:hover{opacity:1}
.comment-form{display:flex;gap:8px;margin-top:.5rem}
.comment-form input[type=text]{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-size:.82rem;outline:none}
.comment-form input[type=text]:focus{border-color:var(--accent)}
.comment-form button{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);color:var(--accent);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:.8rem;white-space:nowrap}
.comment-form button:hover{background:rgba(0,255,255,.2)}

/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;justify-content:center;align-items:flex-start;padding:3vh 2vw;overflow-y:auto}
.modal-backdrop.open{display:flex}
.modal{background:#0d0d2b;border:1px solid var(--border);border-radius:12px;width:100%;max-width:850px;max-height:94vh;overflow-y:auto;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:1.5rem 2rem 1rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:#0d0d2b;z-index:1}
.modal-header h2{font-size:1.3rem;color:#fff}
.modal-close{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.modal-close:hover{color:var(--red);border-color:var(--red)}
.modal-body{padding:1.5rem 2rem 2rem}
.modal-section{margin-bottom:1.5rem}
.modal-section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid rgba(0,255,255,.1)}
.modal-section p,.modal-section li{font-size:.88rem;color:#bbb;line-height:1.7}
.modal-section ul{padding-left:1.25rem;margin-top:.25rem}
.modal-section li{margin-bottom:.3rem}
.modal-section .detail-table{width:100%;border-collapse:collapse;margin-top:.4rem;font-size:.82rem}
.modal-section .detail-table th{text-align:left;color:var(--accent);font-size:.65rem;text-transform:uppercase;letter-spacing:1px;padding:6px 8px;border-bottom:1px solid var(--border)}
.modal-section .detail-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:#bbb}

.author-bar{padding:.75rem 1.5rem;border-top:1px solid var(--border);margin-top:auto}
.author-bar label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.author-bar input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:.8rem;outline:none}
.author-bar input:focus{border-color:var(--accent)}

.stats{display:flex;gap:1.5rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{text-align:center}.stat-val{font-size:1.2rem;font-weight:700;color:#fff}.stat-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.search{padding:.75rem 1.5rem}
.search input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.85rem;outline:none}
.search input:focus{border-color:var(--accent)}
.search input::placeholder{color:#444}

@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:1rem}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>SPACE WARS 3000</h1>
    <p>Game Design Plan</p>
  </div>
  <div class="stats" id="stats"></div>
  <div class="search"><input type="text" id="search" placeholder="Search features..."></div>
  <nav id="nav"></nav>
  <div class="author-bar">
    <label>Your Name (for comments)</label>
    <input type="text" id="authorName" placeholder="e.g. Todd, Claude, Droid..." />
  </div>
</aside>
<main class="main" id="content"></main>
</div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modal"></div></div>

<script>
const PLAN=[
// ============ UNIVERSE & WORLD ============
{id:'universe',title:'Universe & World Design',status:'planned',features:[
{id:'sector-zones',title:'Zone-Based Galaxy Layout',status:'exists',
  desc:'BUILT. Galaxy split into 9 zone classes (core, inner_ring, mid_ring, outer_ring, frontier, deep_space, home, adventure, transit) with ZonePolicyService enforcing security_class and reward multipliers per zone. Difficulty scaling from 0.3x (home) to 2.0x (deep_space). worldPolicyService builds default policies. Sprint scope: hardening/integration of existing implementation, not a rewrite.',
  tags:['backend','pve','pvp'],
  workflow:['Define zone boundaries','Update universe generator','Zone flags on Sector model','Adventure zone cluster generator','Map UI zone colors','PvP flag enforcement','Reward multiplier per zone'],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Establish the foundational world topology that all other systems depend on. Zones define security rules, reward multipliers, NPC behavior, and navigation constraints across the galaxy.</p>
<p><em>[Implementation Status] Partially implemented — hardening/integration work, not greenfield.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>Each Sector has zone_class (core, inner, outer, frontier, deep_space, adventure_pve, adventure_pvp, wormhole_node, home) enforced server-side</li>
<li>Zone boundaries defined at universe generation; config-driven counts: Core 200, Inner 600, Outer 500, PvE Adventure 80, Frontier 400, Deep Space 100, PvP Adventure 60, Wormhole Nodes 40</li>
<li>Each zone carries security_class (safe/monitored/lawless), reward_multiplier (1.0x-2.5x), pvp_enabled flag, hostile_npc_level_range</li>
<li>Single ZonePolicyService evaluates all zone rules for movement, combat, NPC spawning, loot, and map rendering</li>
<li>Home sectors generated on-demand from user_id seed, not counted in shared total</li>
<li>PvP Adventure Zones have 1.5-2x resource spawns, rare ore veins, and exclusive drops</li>
<li>PvE Adventure Zones offer instanced group content (3-5 players) with periodic resets</li>
<li>Zone config is data-driven (config/index.js), not hardcoded in service logic</li>

<li>Sector model must carry access_mode and rule_flags columns enforced server-side to prevent zone rule duplication across movement, combat, NPC spawn, and map code</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Anti-Manipulation, Abuse Prevention, Engagement Metrics. The PRD should reconcile what already exists in the codebase with what the spec requires, identifying gaps between current implementation and target state.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>Sector.zone_class</td><td>ENUM</td><td>core, inner, outer, frontier, deep_space, adventure_pve, adventure_pvp, wormhole_node, home</td></tr>
<tr><td>Sector.security_class</td><td>ENUM</td><td>safe, monitored, lawless -- derived from zone_class, overridable for events</td></tr>
<tr><td>Sector.reward_multiplier</td><td>FLOAT</td><td>Default 1.0, set by zone config</td></tr>
<tr><td>Sector.pvp_enabled</td><td>BOOLEAN</td><td>Derived from zone_class</td></tr>
<tr><td>Sector.npc_level_min/max</td><td>INTEGER</td><td>Zone-driven NPC level range</td></tr>
<tr><td>ZoneConfig</td><td>config/index.js</td><td>Sector counts, multipliers, level ranges per zone_class</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>GET /api/sectors/:id</code> -- returns zone_class, security_class, pvp_enabled</li>
<li><code>GET /api/zones/config</code> -- public zone layout for map rendering (cacheable)</li>
<li><code>Internal: ZonePolicyService.evaluate(sectorId, action) called by all movement/combat/trade endpoints</code></li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Galaxy map color-coded rings: green=core, blue=inner, yellow=outer, orange=frontier, red=deep_space, purple=adventure</li>
<li>Persistent zone legend overlay on map</li>
<li>Entry warning modal with zone name + rules when crossing boundaries ("You are entering PvP space. Are you sure?")</li>
<li>Zone indicator badge in HUD showing current zone + PvP status at all times</li>
<li>Gradual visual transition between zones (color gradient on map edges)</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>None -- this is Priority #1, the foundation for all other features</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: none -- foundational feature</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>Sector/SectorConnection</code>, <code>worldPolicyService</code>, <code>universeGenerator</code></li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Zone rules duplicated across services. <strong>Mitigation:</strong> Single ZonePolicyService with cached zone config; no other service checks zone rules directly.</li>
<li><strong>Risk:</strong> Zone boundaries feel arbitrary to players. <strong>Mitigation:</strong> Gradual difficulty transition at boundaries; narrative justification via lore.</li>
<li><strong>Risk:</strong> Event overrides break zone rules. <strong>Mitigation:</strong> Event zone overrides are temporary flags with TTL; expire automatically.</li>

<li><strong>Risk:</strong> Safe zone tactical hopping undermines risk/reward balance. <strong>Mitigation:</strong> Safe harbor departure imposes 15-minute debuff preventing jumping or trading; harbors provide repair/refuel only with no advanced commerce; prevents tactical PvP evasion.</li>

<li><strong>Risk:</strong> Sprint slip. <strong>Mitigation:</strong> Prioritize — if this slips, it directly slows \`home-sectors\`, \`difficulty-scaling\`, \`deep-space-gates\` (+14 more).</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Massive -- 2-3 weeks. Touches universe generator, Sector model, movement service, combat service, NPC spawning, loot tables, map rendering.</strong></p>
<p><em>[Codex Review] Revised complexity: <strong>Complex</strong></em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>Every sector in database has a valid zone_class</li>
<li>PvP combat blocked in safe zones, permitted in lawless zones</li>
<li>NPC levels in each sector match zone configured range</li>
<li>Reward multipliers apply correctly to trade, combat, and mission rewards</li>
<li>Galaxy map renders zone colors with legend</li>
<li>Zone transition warning fires on boundary crossing</li>
<li>ZonePolicyService has 100% test coverage for all zone/action combinations</li>

<li>Players receive explicit "are you sure?" confirmation modal with zone name and rules when crossing zone boundaries</li>
</ol></div>`},
{id:'home-sectors',title:'Player Home Sectors (Homesteads)',status:'new',
  desc:'Home sectors exist as zone_class: home with 0.3x difficulty, level 1-2 NPCs. is_starting_sector field exists on Sector model but not actively used for player spawning. Needs: player spawn assignment logic, resource planet generation, NPC port, jump points to hubs. Owner + alliance only. One-time Starter Packs (not subscription-tied) for extra sectors.',
  tags:['backend','frontend','store'],
  workflow:['Homestead generator service','Access control middleware','Jump point connections to hubs','Shipyard building type','Shipyard cap per sector/orbit','On-demand loading','Store template purchase flow'],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Give every player a persistent, private space they own and customize. Home sectors are the emotional anchor of the game and the monetization backbone via one-time Starter Packs.</p>
<p><em>[Implementation Status] Partially implemented — hardening/integration work, not greenfield.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>Every player receives 1 home sector on account creation, procedurally generated from user_id seed</li>
<li>Contents: 2-3 resource planets, 1 NPC port (basic supplies), 2-3 jump points to Core hubs, asteroid fields</li>
<li>Owner sets access policy: Locked (owner only), Corp Only, Corp+Allies, Public</li>
<li>Starter Packs (one-time purchase, NOT subscription): Free (1 sector/2 planets), Deluxe (2/4 + 500 gems), Premium (3/6 + shipyard + 1500 gems + cosmetic)</li>
<li>Sectors are PERMANENT -- never removed. No subscription dependency</li>
<li>Shipyards: cap 2 per sector, 1 per planet orbit. Requires Construction Ship + blueprint + resources</li>
<li>Planet cap per sector: 4-6 configurable. Additional planets purchasable within cap</li>
<li>Lazy generation: home sector created on first visit, not pre-generated</li>
<li>7-day full refund window on Starter Pack purchases</li>

<li>Owned-sector ACL models must decouple permanent purchase entitlements from subscriptions; entitlement lifecycle fully auditable</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Entitlement Checks, Purchase Flow, Refund Handling, Ownership/ACL, Build/Upgrade Queue. The PRD should reconcile what already exists in the codebase with what the spec requires, identifying gaps between current implementation and target state.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>HomeSector</td><td>New Model</td><td>sector_id FK, owner_id FK, access_policy ENUM, seed BIGINT, created_at</td></tr>
<tr><td>SectorEntitlement</td><td>New Model</td><td>user_id FK, pack_type ENUM(free/deluxe/premium), purchased_at, refund_deadline, status</td></tr>
<tr><td>HomeSector.access_policy</td><td>ENUM</td><td>locked, corp_only, corp_allies, public</td></tr>
<tr><td>Sector.is_home</td><td>BOOLEAN</td><td>Identifies home sectors in queries</td></tr>
<tr><td>GuestPermission</td><td>New Model</td><td>sector_id FK, target_type ENUM(player/corp/alliance), permission_flags JSONB</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>GET /api/home-sectors</code> -- list player owned sectors with policies</li>
<li><code>PATCH /api/home-sectors/:id/access</code> -- update access policy</li>
<li><code>POST /api/store/starter-pack</code> -- purchase pack (creates entitlement + generates sectors)</li>
<li><code>POST /api/store/starter-pack/:id/refund</code> -- refund within 7-day window</li>
<li><code>GET /api/sectors/:id</code> -- lazy-generates home sector on first access if not exists</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Home sector management panel: resource overview, visitor log, defense status, building queue, decoration placement</li>
<li>Guest permissions: toggle switches for Dock/Trade/Harvest/Build per visitor type</li>
<li>Starter Pack purchase: comparison table, clear pricing, refund policy displayed prominently</li>
<li>Homestead setup wizard: pick rim location, name sector, place first buildings with guided tutorial</li>
<li>Visiting someone else's home sector feels distinct -- their decorations, their layout, their name on the welcome screen</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>sector-zones (zone_class=home), colonization (planet generation), store-philosophy (purchase flow), premium-currency (gem grants)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: sector-zones, action-audit</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>Sector/SectorConnection</code>, <code>worldPolicyService</code>, <code>universeGenerator</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`sector-zones\`, \`action-audit\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Entitlement disputes on refund edge cases. <strong>Mitigation:</strong> SectorEntitlement with audit trail, 7-day refund deadline enforced server-side.</li>
<li><strong>Risk:</strong> Fleet/portal bypass of access control. <strong>Mitigation:</strong> Access check in movement service AND portal service, not just UI.</li>
<li><strong>Risk:</strong> Lazy generation causes latency spike. <strong>Mitigation:</strong> Generate via job queue async; show loading state; cache generated sectors.</li>

<li><strong>Risk:</strong> Economy inflation from optimized trade routes and headless-client botting. <strong>Mitigation:</strong> Dynamic trade-route margin degradation when routes are overused; account-bound (untradeable) materials for high-tier progression; behavioral bot detection via action-pattern analysis and rate limiting.</li>
<li><strong>Risk:</strong> Fleets, portals, and scouts bypassing owner access rules. <strong>Mitigation:</strong> Access check enforced in movement service, portal service, AND fleet service -- not just UI layer.</li>

<li><strong>Risk:</strong> Sprint slip. <strong>Mitigation:</strong> Prioritize — if this slips, it directly slows \`offline-protection\`, \`store-homestead\`.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Massive -- 2-3 weeks. Generator, ACL system, store integration, management UI, entitlement lifecycle.</strong></p>
<p><em>[Codex Review] Revised complexity: <strong>Complex</strong></em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>New player can enter home sector immediately after account creation</li>
<li>Access policy blocks/permits entry correctly for all visitor types</li>
<li>Starter Pack purchase creates correct number of sectors with correct contents</li>
<li>Refund within 7 days removes sectors and entitlement cleanly</li>
<li>Shipyard cap enforced: 2 per sector, 1 per orbit</li>
<li>Home sector persists across sessions and server restarts</li>
</ol></div>`},
{id:'sector-scaling',title:'Universe Scaling Config',status:'planned',
  desc:'BUILT. Universe config supports initialSectors, spiralArms, galaxyShape, galaxyRadius. Config exposed at GET /api/admin/universe/config. Admin can regenerate via POST /api/admin/universe/generate. Environment variables: UNIVERSE_SEED, INITIAL_SECTORS, SPIRAL_ARMS, GALAXY_SHAPE, GALAXY_RADIUS. Default: 200 systems, spiral shape, radius 500.',
  tags:['backend'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Define infrastructure scaling roadmap from 200 concurrent to 3,000+ without requiring a rewrite. Provides cost projections and performance budgets at each tier.</p>
<p><em>[Implementation Status] Net-new system — requires full implementation.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>Four scaling tiers: Launch (1,980 sectors/200 concurrent/\$40-60/mo), Growth (2,000/500/\$130-175), Scale (3,500/1,000/\$400-600), Future (10,000/3,000+/\$1,500-2,500)</li>
<li>Sector count increase is config-only; universe generator seeds deterministically</li>
<li>Per-sector tick budget: max 5ms at 10 ticks/second with monitoring alerts</li>
<li>Per-query budget: max 50ms for sector load, 10ms for movement validation</li>
<li>PostgreSQL migration path from SQLite with zero-downtime cutover plan</li>
<li>Redis cache layer for hot sector data, NPC state, player positions</li>
<li>Background workers split from request handlers at Growth tier</li>
<li>Oversell ratio 7:1 (not all sectors active simultaneously)</li>

<li>Mandatory infrastructure prerequisites before 1k concurrent: PostgreSQL, Redis/cache layer, background workers, and tick-budget telemetry</li>
<li>Measurable per-tick budgets: sector generation &lt;50ms, query budget per tick, state mutation budget per player</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Migration/Backfill, Acceptance Criteria, Error States. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>

<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>

</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Players experience no visible difference between tiers</li>
<li>Universe feels alive at low population via NPC caravans, environmental events, dynamic port activity</li>
<li>Admin dashboard: real-time tick budgets, query performance, player distribution heat map</li>

<li>Universe must feel alive at low density (~0.4 players/sector average): NPC trade activity, environmental events, dynamic port activity fill gaps</li>

</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>job-queue (background workers), live-ops-observability (metrics/alerts)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: job-queue, live-ops-observability, sector-instance</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>tickService</code>, <code>socketService</code>, <code>realtimeCombatService</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`job-queue\`, \`live-ops-observability\`, \`sector-instance\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> SQLite-to-PostgreSQL migration breaks queries. <strong>Mitigation:</strong> Sequelize abstracts dialect; full test suite runs against both DBs.</li>
<li><strong>Risk:</strong> Universe feels empty at low player density. <strong>Mitigation:</strong> NPC trade caravans, random events, port activity fill gaps.</li>
<li><strong>Risk:</strong> Cost estimates are optimistic. <strong>Mitigation:</strong> Load test at each tier BEFORE committing to player counts.</li>

<li><strong>Risk:</strong> Economy inflation from optimized trade routes and headless-client botting. <strong>Mitigation:</strong> Dynamic trade-route margin degradation when routes are overused; account-bound (untradeable) materials for high-tier progression; behavioral bot detection via action-pattern analysis and rate limiting.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Medium per tier -- Launch is current state. Each subsequent tier is 1-2 weeks of infrastructure work.</strong></p>

</div>

<li>Universe generator produces identical layouts for same seed across all config changes</li>
<li>PostgreSQL migration completes with zero data loss and passing test suite</li>
<li>Redis cache reduces DB queries per tick by 60%+ at Growth tier</li>
</ol></div>`},
{id:'difficulty-scaling',title:'Zone Difficulty Scaling',status:'new',

{id:'space-phenomena',title:'Space Phenomena & Hazard Presentation',status:'exists',

{id:'deep-space-gates',title:'Player-Built Gates + Commercial Portals',status:'new',
  desc:'Gate connection_type exists in SectorConnection model and config, treated like wormholes with different lane_class. Missing: gate-specific mechanics (permissions, toll systems, activation, construction, destruction). Three planned tiers: Personal gates (home-to-owned), Corporation gates (tolls, PvP-destructible), Commercial portals with 10 Space Hub types.',

<li>First-aggressor tracking for commercial portal protection</li>

<tr><td>TollLedger</td><td>New Model</td><td>gate_id FK, payer_id FK, amount, timestamp</td></tr>

<li>Toll popup on approach: price, owner corp name, accept/decline buttons</li>
<li>Gate builder UI: construction progress, resource requirements, projected ROI</li>
<li>Each Space Hub type has unique visual theme and ambient audio</li>
<li>Commercial portal: robust PvP warning modal before entry (red border, explicit text)</li>
<li>Hub management panel: revenue tracking, visitor logs, defense status, upgrade queue</li>

<li>10 Space Hub types (canonical list defined in port-types feature) each with unique visual style and ambient audio</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>sector-zones (sector ownership), corporations (corp treasury), action-audit (toll/aggression tracking), ship-types (Construction Ship)</p>
<ul>

{id:'protected-lanes',title:'Protected Space Lanes',status:'exists',

{id:'route-planner',title:'Route Planner (Weighted Pathfinder)',status:'exists',
  desc:'Currently implemented (BFS, client-side). Click a distant sector to see the shortest path with animated cyan overlay and hop count. Uses BFS on adjacency map.',
  tags:['frontend'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Provide intelligent server-side weighted pathfinding that optimizes for safety, speed, or cost across a galaxy with portals, protected lanes, tolls, and zone policies. Replaces existing client-side BFS (unweighted, fewest-hops only) with Dijkstra-based weighted graph accounting for travel time, hazards, lane types, access restrictions, and tolls.</p>
<p><em>[Implementation Status] Client-side BFS exists. Server-side weighted pathfinder and trade advisor require full implementation. See <code>docs/prd-route-planner.md</code> for complete algorithm spec, model schemas, API reference, and test patterns.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>Server-side pathfinding API replacing client-only BFS for weighted routes</li>
<li>Three route modes: Fast (fewest hops), Safe (prefer protected lanes), Cheap (minimize fuel + tolls)</li>
<li>Include portal connections, static wormholes, and jump drive range in pathfinding graph</li>
<li>Show estimated time, fuel cost, toll cost, and danger level for each route option</li>
<li>Save favorite routes for reuse (max 10 per player)</li>
<li>Multi-stop route planning for trade circuits</li>
<li>Animated path overlay with color coding: green=safe, yellow=mixed, red=PvP</li>

<li>Replace client-only BFS with server-side path API that optimizes for safe, fast, or cheap routes once weighted edges (portals, locks, tolls, travel_time) exist</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Ownership/ACL, Construction State, Toll Rules, Discovery/Visibility. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>SavedRoute</td><td>New Model</td><td>id, player_id FK, name, waypoints JSONB, mode ENUM(fast/safe/cheap)</td></tr>
<tr><td>RouteCache</td><td>Redis/Memory</td><td>Cached common routes with TTL for performance</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>GET /api/routes?from=X&to=Y&mode=fast|safe|cheap</code> -- computed route with cost breakdown</li>
<li><code>GET /api/routes/multi?stops=X,Y,Z&mode=safe</code> -- multi-stop route</li>
<li><code>POST /api/routes/saved</code> -- save a favorite route</li>
<li><code>GET /api/routes/saved</code> -- list saved routes</li>
<li><code>DELETE /api/routes/saved/:id</code> -- remove saved route</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Click distant sector: route options panel showing Fast/Safe/Cheap with stats for each</li>
<li>Animated overlay changes color by danger: green safe, yellow mixed, red PvP</li>
<li>Multi-stop builder: click sectors in order to build a circuit; reorder with drag</li>
<li>Saved routes accessible from sidebar quick-menu</li>
<li>Trade circuit calculator: shows total profit potential along a multi-stop route</li>

<li>Route mode selector (Fast/Safe/Cheap) with estimated time, fuel cost, and danger level per route</li>
<li>Multi-stop route planning (trade circuit builder). Save favorite routes. Path color by danger (green safe, yellow mixed, red PvP)</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>protected-lanes (safety weights), wormholes-static (portal connections), sector-zones (zone data)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: sector-zones</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>sectorGraphService</code>, <code>movementService</code>, <code>client/GalaxyMap</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`sector-zones\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Server pathfinding too slow for large galaxy. <strong>Mitigation:</strong> A* with precomputed zone-level heuristics; cache common routes in Redis.</li>
<li><strong>Risk:</strong> Route stale if portals change. <strong>Mitigation:</strong> Routes include version hash; invalidate on portal/connection changes.</li>

<li><strong>Risk:</strong> Sprint slip. <strong>Mitigation:</strong> Prioritize — if this slips, it directly slows \`wormholes-static\`, \`jump-drives\`, \`protected-lanes\` (+1 more).</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Medium -- 1 week. Existing BFS foundation, add weighted graph + server API + multi-stop + save.</strong></p>
<p><em>[Codex Review] Revised complexity: <strong>Complex</strong></em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>Safe route avoids PvP sectors and uses protected lanes</li>
<li>Fast route minimizes hop count</li>
<li>Cheap route minimizes fuel + toll costs</li>
<li>Multi-stop routes calculate correctly</li>
<li>Saved routes persist and load correctly</li>
</ol></div>`}
]},

{id:'pvp-rewards',title:'PvP Zone Reward Multipliers',status:'new',
  desc:'Zone-specific reward multipliers already applied via rule_flags.reward_multiplier: Core 1x → Deep Space 2.1x. Partially implemented in combat/trade reward paths. Missing: exclusive rare crafting materials and ship components only in PvP space, diminishing returns for same-target kills, alt-account detection signals, reward journaling with idempotency keys.',
  tags:['backend','pvp'],
  workflow:['ZoneConfig reward multiplier lookup per zone_class','Apply multipliers to trade profit, combat loot, mission rewards','PvP-exclusive drop table (rare crafting materials, components)','Diminishing returns: same-target kill tracking per 24h window','Reward journaling with idempotency keys','Alt-account detection signal integration','Tests for multiplier application and diminishing returns'],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Incentivize PvP participation with meaningful multipliers and exclusive drops while preventing exploitation through diminishing returns and anti-farming measures.</p>

<li>Alt-account detection signals and reward journaling to prevent PvP zones from becoming credit-printing exploits</li>
<li>Hardware ID / device fingerprint tracking: collect browser fingerprint and hardware identifiers at login to detect alt-account reward farming. Flag accounts sharing hardware IDs for manual review. Escalating NPC security response to persistent zone camping (spawn system patrols after N kills in same sector within 1h)</li>

{id:'pvp-choke',title:'Anti-Griefing Design',status:'new',
  desc:'6-8 wide entry corridors into PvP, 30-second invuln buffer on entry. Tourist Pass (20 min immunity, in-game currency or store). Tourists cannot enter owned sectors. Anti-scouting restrictions.',
  tags:['backend','pvp','store'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Prevent griefing from killing PvP participation. Every protection mechanism must be discoverable by new players without reading the wiki.</p>
<p><em>[Implementation Status] Net-new system — requires full implementation.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>6-8 wide entry corridors into PvP (not chokepoints)</li>
<li>30-second invulnerability buffer on PvP zone entry</li>
<li>Tourist Pass: 20 minutes immunity, purchasable with credits or store. Cannot enter owned sectors. Eligibility: no PvP sector ownership, no recent PvP combat, account age 7+ days, level 3+</li>
<li>Bounty escalation: repeated kills of same low-level player auto-generates escalating bounty</li>
<li>Newbie Shield: players under L5 have "New Pilot" tag; killing them yields 0 rewards + "Bully" debuff</li>
<li>Revenge flag: 10-minute 15% damage bonus against your killer</li>
<li>Safe logout within 30 seconds when not in active combat</li>
<li>Distress beacon: broadcasts location to allied/neutral players</li>
<li>All protections backed by persisted state models (not ad-hoc timers)</li>

<li>Each protection mechanism persisted as first-class backend object: TouristPass, ProtectionState, BountyCase, CrimePenalty, InsurancePolicy, EmergencyWarpRequest -- evaluated by CombatPolicyService and TravelPolicyService, not UI-driven timers</li>
<li>Tourist Pass eligibility requires no-territory, no-recent-PvP, and new-player-cohort checks to prevent scouting abuse (no arbitrary account-age gate that blocks genuine first-time users)</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Anti-Manipulation, Abuse Prevention, Engagement Metrics, Entitlement Checks, Purchase Flow. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>TouristPass</td><td>New Model</td><td>player_id FK, activated_at, issued_at, expires_at, status ENUM, sector_restrictions JSONB</td></tr>
<tr><td>ProtectionState</td><td>New Model</td><td>player_id FK, type ENUM(newbie/entry_buffer/tourist), active BOOLEAN, expires_at, conditions JSONB</td></tr>
<tr><td>BountyCase</td><td>New Model</td><td>target_id FK, amount, reason, posted_by (system/player), expires_at</td></tr>
<tr><td>RevengeFlag</td><td>New Model</td><td>victim_id FK, killer_id FK, bonus_pct, expires_at</td></tr>
<tr><td>InsurancePolicy</td><td>New Model</td><td>player_id FK, ship_id FK, coverage_type ENUM, coverage_pct INTEGER, premium_paid INTEGER, purchased_at, expires_at, payout_rules JSONB</td></tr>
<tr><td>CrimePenalty</td><td>New Model</td><td>offender_id FK, offense_type ENUM, severity INTEGER, penalty_flags JSONB, issued_at, expires_at</td></tr>
<tr><td>EmergencyWarpRequest</td><td>New Model</td><td>player_id FK, charges_remaining INTEGER, last_used_at, blocked_by JSONB (scram/contraband/debuff)</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>POST /api/pvp/tourist-pass</code> -- activate tourist pass (validates eligibility)</li>
<li><code>GET /api/pvp/protection</code> -- current protection states for player</li>
<li><code>POST /api/pvp/distress</code> -- broadcast distress beacon</li>
<li><code>POST /api/pvp/safe-logout</code> -- initiate safe logout countdown</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Newbie Shield: visible countdown timer on HUD</li>
<li>Tourist Pass: "Observer" badge visible to other players</li>
<li>Griefer names in red, bounty hunter names in gold</li>
<li>Crime popup: consequences shown before attacking non-hostile player</li>
<li>Emergency warp: big red button, 3-second channel with visual</li>
<li>Insurance status on ship panel</li>

<li>Clear UX feedback for each protection: Newbie Shield countdown on HUD; Tourist Pass shows "Observer" badge; griefer names in red, bounty hunters in gold; crime popup showing consequences before attacking non-hostile; emergency warp as big red panic button with 3-second channel; insurance coverage status on ship panel</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>pvp-zones (zone rules), action-audit (griefing detection), premium-currency (store purchase)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: pvp-zones, pvp-rewards, notifications</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>combatPolicyService</code>, <code>realtimeCombatService</code>, <code>PlayerProtectionState</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`pvp-zones\`, \`pvp-rewards\`, \`notifications\`</li>

<li><strong>[Cross-ref]</strong> Appeal workflow provided by moderation-tools — depends on <code>moderation-tools</code></li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Tourist Pass used for scouting. <strong>Mitigation:</strong> Cannot enter owned sectors; eligibility blocks PvP veterans.</li>
<li><strong>Risk:</strong> Emergency warp becomes grief-free escape. <strong>Mitigation:</strong> Fails if scrammed, carrying contraband, or under anti-escape debuff; consumes charge.</li>

<li><strong>Risk:</strong> Safe zone tactical hopping undermines risk/reward balance. <strong>Mitigation:</strong> Safe harbor departure imposes 15-minute debuff preventing jumping or trading; harbors provide repair/refuel only with no advanced commerce; prevents tactical PvP evasion.</li>
<li><strong>Risk:</strong> Emergency warp becomes griefless escape exploit. <strong>Mitigation:</strong> Emergency warp must consume a server-issued charge and fail hard while scrammed, carrying contraband, or under anti-escape debuffs.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Complex -- 2 weeks. Multiple protection systems, each with state model + enforcement + UX.</strong></p></div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>Tourist Pass grants 20 minutes immunity with correct eligibility checks</li>
<li>Entry buffer activates on PvP zone entry and lasts 30 seconds</li>
<li>Newbie Shield active for sub-L5 players with visible tag</li>
<li>Bounty auto-escalates on repeated low-level kills</li>
<li>Safe logout works within 30 seconds when not in combat</li>
</ol></div>`},
{id:'pvp-harbors',title:'Neutral Safe Harbors in PvP Space',status:'new',
  desc:'Partially implemented: safe_harbor flag in sector.rule_flags with entry protection via combatPolicyService. travelProtectionDefaultMs grants invulnerability on entry. Missing: neutral station docking, repair/refuel services without trading, forward operating base mechanics. Current safe harbors are zone-level, not station-level.',
  tags:['backend','pvp'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Provide forward operating bases in PvP space where players can repair, refuel, and catch their breath without risk. Not a safe trading loophole.</p>
<p><em>[Implementation Status] Net-new system — requires full implementation.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>3-5 neutral stations in Frontier and Deep Space</li>
<li>PvP disabled within docking radius</li>
<li>Services: repair and refuel ONLY. No trading of player goods</li>
<li>Cannot be owned, attacked, or destroyed</li>
<li>10-second warmup to undock (visible to other players, prevents combat logging)</li>
<li>No re-dock within 60 seconds of engaging in combat (dealing OR taking damage) to prevent hit-and-run attacks</li>

<li>Explicit dock-radius policy and transition rules: 10-second warmup to leave safe harbor, visible to other players. Prevents combat logging (cannot instantly re-enter after taking damage)</li>
<li>Narrow services only: repair/refuel/basic supplies. No player-to-player trading or advanced commerce inside harbors</li>
<li>Safe harbor departure debuff: 15-minute debuff after undocking prevents jumping to another safe zone or trading at ports. Forces commitment to PvP space after using harbor services</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Anti-Manipulation, Abuse Prevention, Engagement Metrics, Idempotency, Replay Prevention. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>Sector.has_safe_harbor</td><td>BOOLEAN</td><td>Identifies harbor sectors</td></tr>
<tr><td>HarborDockState</td><td>Transient</td><td>player_id, harbor_id, docked_at, undock_warmup_start, last_damage_at</td></tr>
<tr><td>HarborDebuff</td><td>Transient</td><td>player_id, harbor_id, debuff_type ENUM(departure), applied_at, expires_at (15 min)</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>POST /api/harbors/:id/dock</code> -- dock at safe harbor</li>
<li><code>POST /api/harbors/:id/undock</code> -- initiate 10-second undock warmup</li>
<li><code>POST /api/harbors/:id/repair</code> -- repair ship (at harbor rates)</li>
<li><code>POST /api/harbors/:id/refuel</code> -- refuel ship</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>

<li>Docking animation that feels like relief</li>
<li>Undock warmup: 10-second countdown visible to all nearby players</li>
<li>No trading UI available while in harbor (only repair/refuel)</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>pvp-zones (PvP space placement), sector-zones (special sector type)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: sector-zones, pvp-zones</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>worldPolicyService</code>, <code>movementService</code>, <code>Sector</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`sector-zones\`, \`pvp-zones\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Combat logging exploit. <strong>Mitigation:</strong> 10-second undock warmup + 60-second re-dock cooldown after damage.</li>
<li><strong>Risk:</strong> Safe market loophole. <strong>Mitigation:</strong> No trading services available; only repair and refuel.</li>

<li><strong>Risk:</strong> Safe zone tactical hopping undermines risk/reward balance. <strong>Mitigation:</strong> Safe harbor departure imposes 15-minute debuff preventing jumping or trading; harbors provide repair/refuel only with no advanced commerce; prevents tactical PvP evasion.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Medium -- 3-5 days. Special sector type, dock/undock mechanics, restricted services.</strong></p>
<p><em>[Codex Review] Revised complexity: <strong>Complex</strong></em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>

<li>Only repair and refuel available (no trading)</li>

{id:'offline-protection',title:'Offline Ship Protection',status:'exists',
  desc:'BUILT. raidProtectionService.isOwnerOfflineProtected() checks last_login timestamp with configurable threshold. Raid cooldowns and repeated-attacker throttling via ColonyRaidProtection model. PlayerProtectionState model tracks protection windows. Sprint scope: tune protection thresholds and add auto-dock/auto-recall mechanics.',
  tags:['backend','store'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Protect player investment during offline periods so players feel safe logging out. Protection is a shield for offline players, never a weapon.</p>
<p><em>[Implementation Status] Net-new system — requires full implementation.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>PvE sectors: 3-day protection then auto-dock to nearest port</li>
<li>PvP sectors: 2-hour vulnerability window then auto-recall to home sector. Non-bound cargo and unequipped loot dropped as salvage at origin point to prevent risk-free smuggling</li>
<li>Home sector: always safe</li>
<li>PvP Base Token (7-day): grindable or purchasable. Protects ONE designated planet. Only active when player/all corp members offline. 48h cooldown between uses</li>
<li>Corporation HQ Token: same but for corp HQ. Only active when ALL corp members offline</li>
<li>Vacation Pass: 7-day extended protection in all zones. Cannot activate during/within 1h of PvP combat</li>
<li>Protection is persisted state machine (not just logout timestamps)</li>
<li>Push notification if assets attacked while offline</li>

<li>Persisted protection state machine (not just logout timestamps): tokens, recalls, and vulnerability windows tracked via entitlement/audit records for dispute resolution</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Entitlement Checks, Purchase Flow, Refund Handling. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>OfflineProtection</td><td>New Model</td><td>player_id FK, ship_id/colony_id FK, zone_type, protection_type ENUM(base/pvp_token/corp_hq/vacation), activated_at, expires_at, status</td></tr>
<tr><td>PvPBaseToken</td><td>New Model</td><td>player_id FK, planet_id FK, activated_at, expires_at, cooldown_until</td></tr>
<tr><td>VacationPass</td><td>New Model</td><td>player_id FK, activated_at, expires_at, last_pvp_at (eligibility check)</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>POST /api/protection/pvp-token</code> -- apply PvP Base Token to planet</li>
<li><code>POST /api/protection/vacation</code> -- activate Vacation Pass</li>
<li><code>GET /api/protection/status</code> -- current protection states for all assets</li>
<li><code>Internal: ProtectionStateService evaluated on every attack action</code></li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Logout screen shows protection status for each ship/colony</li>
<li>Return-to-game summary: "While you were away: Colony produced 500 Iron, Agent completed 3 trades, no attacks"</li>
<li>PvP Base Token: visible shield icon on protected planet</li>
<li>Push notification on mobile if assets attacked while offline</li>

<li>On logout: show exact protection status per ship/colony. Push notifications if assets attacked while offline</li>
<li>"Return to game" summary screen: colony production, agent activity, and attack history while away</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>pvp-zones (zone-specific rules), home-sectors (always-safe home), job-queue (auto-dock/recall timers), notifications (push alerts)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: pvp-zones, home-sectors</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>worldPolicyService</code>, <code>combatPolicyService</code>, <code>User</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`pvp-zones\`, \`home-sectors\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Token creates permanent PvP invulnerability. <strong>Mitigation:</strong> 48h cooldown between uses; only active when ALL members offline.</li>
<li><strong>Risk:</strong> Vacation Pass used strategically before PvP. <strong>Mitigation:</strong> Cannot activate within 1h of PvP engagement.</li>
<li><strong>Risk:</strong> Dispute on protection state at attack time. <strong>Mitigation:</strong> Full audit trail with timestamps on all state transitions.</li>

<li><strong>Risk:</strong> Safe zone tactical hopping undermines risk/reward balance. <strong>Mitigation:</strong> Safe harbor departure imposes 15-minute debuff preventing jumping or trading; harbors provide repair/refuel only with no advanced commerce; prevents tactical PvP evasion.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Complex -- 1-2 weeks. Protection state machine, token system, auto-dock/recall jobs, push notifications.</strong></p></div>

<li>PvP ships vulnerable for 2 hours then auto-recall to home</li>
<li>PvP Base Token protects designated planet when owner offline</li>
<li>Vacation Pass blocked if PvP combat within last hour</li>
<li>Return-to-game summary shows accurate offline activity</li>
</ol></div>`}
]},

{id:'npc-ux',title:'NPC UX & Living World',status:'new',features:[
{id:'npc-foundation',title:'NPC Foundation Fixes (F0-F5)',status:'exists',
  desc:'AI NPC foundation exists: 7 phases complete (Foundation, Behavior Trees, Dialogue, Tick, WebSocket, Admin, Chat UI). Provider-agnostic AI (Anthropic, OpenAI, Gemini, Grok, NVIDIA, OpenRouter, Local). However, 6 foundation blockers identified: F0 per-player sessions (NpcConversationSession needed), F1 persistent combat targets, F2 live event pipeline (server doesn\'t emit hails/dialogue events), F3 dialogue action execution (side effects missing), F4 context quality, F5 E2E tests. Core illusion gap: 281 NPCs exist but 271 idle; client expects socket events server never emits.',
  tags:['backend','frontend'],
  workflow:['NpcConversationSession model','Per-player dialogue state','target_ship_id on NPC combat state','Emit npc:hails_player events','Emit npc:dialogue events','Emit npc:state_change broadly','dialogueActionService for side effects','Normalize buildDialogueContext/buildInteractivePrompt','Context-aware cache keys','E2E test suite for NPC UX'],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Address 6 foundation blockers (F0-F5) identified in the NPC UX review (<code>docs/npc-ux-living-world-prds.md</code>). These are prerequisites for all living-world features — without them, NPC dialogue locks out other players, combat targets are inconsistent, live events never fire, dialogue choices have no gameplay consequence, AI context is unreliable, and there is no E2E test coverage for NPC interactions.</p>
<p><strong>Core problem (illusion gap):</strong> The codebase has solid NPC scaffolding (281 NPCs, behavior trees, dialogue, socket hooks), but the player-facing experience is still mostly static. The client expects live hail/dialogue/state-change events the server never emits. Dialogue actions return flavor text instead of gameplay consequences. NPCs have no memory, no faction identity, and a global dialogue lock inappropriate for MMO. 271 of 281 NPCs are idle.</p></div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li><strong>F0 — Per-Player Conversation Sessions:</strong> Replace global <code>NPC.dialogue_state</code> with <code>NpcConversationSession</code> keyed by npc_id + user_id. Remove MMO-visible "busy NPC" behavior for standard service NPCs. Keep temporary exclusivity only for rare encounter NPCs if needed</li>
<li><strong>F1 — Persistent Combat Targets:</strong> Add <code>target_ship_id</code> and <code>target_user_id</code> to NPC combat state. Combat ticks must use the persisted target, not pick any player ship in sector. UI warnings reference the correct target</li>
<li><strong>F2 — Live Event Pipeline:</strong> Emit real <code>npc:hails_player</code>, <code>npc:dialogue</code>, and broader <code>npc:state_change</code> events via Socket.io. Feed <code>sectorNPCs</code> into live system view. Add player-visible event feed for arrivals, departures, scans, patrol warnings, trader offers</li>
<li><strong>F3 — Dialogue Action Execution:</strong> Handle dialogue <code>data.action</code> payloads on both client and server. Open trading in correct mode. Create escort, bounty, rumor, bribe, and contract flows that write game state. Log accepted/refused actions to audit layer</li>
<li><strong>F4 — Dialogue Context Quality:</strong> Normalize context contracts between <code>buildDialogueContext()</code> and <code>buildInteractivePrompt()</code>. Use context-aware cache keys: NPC, intent, sector, relevant market state, and faction state. Fix stale/misleading cached responses</li>
<li><strong>F5 — NPC UX E2E Tests:</strong> Dedicated E2E coverage for live NPC roster updates, hail notification acceptance/dismissal, service NPC action flows, target-consistent NPC attacks, and repeated conversations with memory cues</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>NpcConversationSession</td><td>New Model</td><td>session_id PK, npc_id FK, user_id FK, started_at, last_message_at, state_json JSONB, status ENUM(active/ended)</td></tr>
<tr><td>NPC.target_ship_id</td><td>Column Add</td><td>FK to Ship, nullable — persisted combat target for consistent engagement</td></tr>
<tr><td>NPC.target_user_id</td><td>Column Add</td><td>FK to User, nullable — persisted combat target user</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>POST /api/npcs/:id/dialogue/start</code> — start conversation session (returns session_id)</li>
<li><code>POST /api/npcs/:id/dialogue/message</code> — send message within session</li>
<li><code>POST /api/npcs/:id/dialogue/end</code> — end conversation session</li>
<li>Socket events: <code>npc:hails_player</code>, <code>npc:dialogue</code>, <code>npc:state_change</code>, <code>npc:combat_warning</code></li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Multiple players can talk to the same service NPC simultaneously (no "busy" lock)</li>
<li>Combat warnings reference the correct NPC target ship</li>
<li>Hail notifications carry real NPC text, not client-fabricated greetings</li>
<li>Dialogue responses show consequence preview before player commits</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>Existing NPC system (npcService, dialogueService, socketService, useNPCEvents hook)</p></div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Session table growth with many concurrent conversations. <strong>Mitigation:</strong> Auto-expire sessions after 10 minutes of inactivity; archive ended sessions periodically.</li>
<li><strong>Risk:</strong> Breaking existing dialogue flow during migration. <strong>Mitigation:</strong> Feature-flag new session system; fall back to existing single-state if disabled.</li>
<li><strong>Risk:</strong> Socket event volume in high-density sectors. <strong>Mitigation:</strong> Rate-limit events per sector; batch updates when NPC density exceeds threshold.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Complex — 2 weeks. 6 discrete blockers touching dialogue, combat, sockets, context, and testing layers.</strong></p></div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>Two players can converse with the same NPC simultaneously without lock conflicts</li>
<li>NPC combat target persists across ticks — attacks the same player until disengage/death</li>
<li>Client receives real <code>npc:hails_player</code> events from server (not client-fabricated)</li>
<li>Dialogue "Buy Goods" action opens trading UI in buy mode with correct port/NPC</li>
<li><code>buildDialogueContext()</code> and <code>buildInteractivePrompt()</code> produce consistent context keys</li>
<li>E2E tests pass for hail flow, service action flow, and combat target consistency</li>
</ol></div>`},

  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Give sectors identity so NPCs feel place-based instead of randomly sampled. Adjacent regions should visibly differ in NPC composition and tone. Players should predict safer or riskier routes from map signals and NPC behavior, creating readable geography without requiring boss content or faction war systems.</p></div>

  <li>Clan harassment alerts (increased raider activity)</li>

</li>
<li>Sector-level regional summaries for efficient territory pressure calculation (no whole-world scan per tick)</li>

</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>

<tr><td>TerritoryEvent</td><td>New Model</td><td>id, sector_id FK, event_type ENUM(convoy/sweep/toll/harassment), faction_id FK, started_at, expires_at, effects JSONB</td></tr>

<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>

<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>

  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Track the background NPC AI runtime as its own roadmap feature. NPCs should feel like living actors making tactical decisions, not static spawns waiting for player interaction.</p>

<li>Run scheduled NPC tactical evaluation through behavior trees first</li>

<li>Expose runtime status and decision visibility to admins</li>
<li>Publish world-state changes back to clients through socket events</li>
<li>Process active NPCs on a defined tick cadence (configurable interval)</li>

</ol></div>

<tr><td>behaviorTreeService</td><td>Service</td><td>Evaluates behavior tree nodes for NPC decisions</td></tr>
<tr><td>npcActionExecutor</td><td>Service</td><td>Executes decided actions (move, attack, trade, flee)</td></tr>
<tr><td>tickService</td><td>Service</td><td>Orchestrates NPC processing batches on interval</td></tr>

{id:'store',title:'Store & Monetization',status:'new',features:[
{id:'store-philosophy',title:'Store Design Philosophy',status:'new',
  desc:'Design-only — no store system exists in codebase. Establishes rules: everything purchasable MUST be grindable. Formal entitlement taxonomy (permanent, consumable, cosmetic, convenience) with hard boundaries. One-time Starter Packs (not subscription-tied). Premium subscription for convenience only. Free players on the SAME map.',
  tags:['store'],
  workflow:[],
  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>Establish the monetization framework as an entitlement taxonomy with hard rules preventing pay-to-win, ensuring player trust and sustainable revenue.</p>
<p><em>[Implementation Status] Net-new system — requires full implementation.</em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Functional Requirements</div><ol>
<li>Everything purchasable MUST be grindable in-game</li>
<li>Four entitlement categories: Permanent (sectors), Consumable (tokens), Cosmetic (skins), Convenience (boosters)</li>
<li>Starter Packs are one-time purchase, NOT subscription-tied</li>
<li>Premium subscription for convenience only: 2x gem earn, queue priority, cosmetic badge</li>
<li>Subscription cancellation never removes owned assets</li>
<li>Free players on same map as premium (no population split)</li>
<li>No loot boxes or randomized purchases</li>
<li>Every store item passes the "angry Reddit post" test</li>
<li>24-hour refund window (7-day for Homesteads) on all purchases</li>

<li>Formal entitlement taxonomy: permanent entitlements, consumables, cosmetics, and convenience items with hard boundaries. Later store features must not leak power or create refund edge cases</li>
<li>"Angry Reddit post" test: every purchasable item must also be earnable in-game. No loot boxes or randomized purchases. 24h refund window on all purchases (7-day exception for Homestead permanent entitlements)</li>

<li><strong>[Codex PRD Guidance]</strong> Add sections for Entitlement Checks, Purchase Flow, Refund Handling. The PRD should define concrete state machines, data contracts, and error handling before implementation begins.</li>
</ol></div>
<div class="modal-section"><div class="modal-section-title">Data Model</div>
<table class="detail-table"><tr><th>Model/Column</th><th>Type</th><th>Notes</th></tr>
<tr><td>StoreItem</td><td>New Model</td><td>id, name, category ENUM(permanent/consumable/cosmetic/convenience), price_gems, price_credits, grind_path TEXT</td></tr>
<tr><td>PlayerEntitlement</td><td>New Model</td><td>player_id FK, item_id FK, type ENUM(permanent/consumable), purchased_at, expires_at, refund_deadline</td></tr>
<tr><td>Subscription</td><td>New Model</td><td>player_id FK, tier ENUM(free/premium), started_at, expires_at, auto_renew BOOLEAN</td></tr>
</table></div>
<div class="modal-section"><div class="modal-section-title">API Surface</div><ul>
<li><code>GET /api/store</code> -- catalog with prices, categories, grind alternatives</li>
<li><code>POST /api/store/purchase</code> -- buy item (validates balance, creates entitlement)</li>
<li><code>POST /api/store/refund</code> -- refund within 24h window</li>
<li><code>GET /api/store/entitlements</code> -- player owned entitlements</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">UX Specification</div><ul>
<li>Store page with clear category tabs: Starter Packs, Cosmetics, Convenience, Homestead</li>
<li>Every item shows gem price AND gameplay-earnable alternative</li>
<li>Labels: "Cosmetic", "Convenience", "Expansion" on every item</li>
<li>Purchase confirmation with refund policy displayed</li>
<li>No urgency/scarcity dark patterns</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Dependencies</div><p>premium-currency (gem system), home-sectors (Starter Packs)</p>
<ul>
<li><strong>[Codex Review]</strong> Required dependencies: premium-currency, action-audit</li>
<li><strong>[Sprint Hotspots]</strong> Key files: <code>config/index</code></li>
<li><strong>[Sprint Sequencing]</strong> Must schedule after: \`premium-currency\`, \`action-audit\`</li>
</ul>
</div>
<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
<li><strong>Risk:</strong> Convenience items creep into pay-to-win. <strong>Mitigation:</strong> Entitlement taxonomy enforced; review board for new items.</li>
<li><strong>Risk:</strong> Refund abuse. <strong>Mitigation:</strong> 24h window with one-time-per-item limit; audit trail.</li>

<li><strong>Risk:</strong> Economy inflation from optimized trade routes and headless-client botting. <strong>Mitigation:</strong> Dynamic trade-route margin degradation when routes are overused; account-bound (untradeable) materials for high-tier progression; behavioral bot detection via action-pattern analysis and rate limiting.</li>

<li><strong>Risk:</strong> Sprint slip. <strong>Mitigation:</strong> Prioritize — if this slips, it directly slows \`store-cosmetics\`, \`store-homestead\`, \`store-convenience\`.</li>
</ul></div>
<div class="modal-section"><div class="modal-section-title">Complexity &amp; Estimate</div><p><strong>Medium -- 1-2 weeks. Entitlement system, store catalog, purchase flow, refund system.</strong></p>
<p><em>[Codex Review] Revised complexity: <strong>Complex</strong></em></p>
</div>
<div class="modal-section"><div class="modal-section-title">Acceptance Criteria</div><ol>
<li>All store items have a grind alternative displayed</li>
<li>Subscription cancellation does not remove any owned assets</li>
<li>Refund works within 24h window</li>
<li>No store item provides combat advantage over non-purchasable items</li>
</ol></div>`},

{id:'colony-surface',title:'Colony Surface Grid (Minecraft-Style)',status:'exists',
  desc:'FLAGSHIP FEATURE. Two systems: 2D PixiJS (functional) + 3D Voxel Engine (Three.js, rendering fixed — greedy mesher winding order + texture atlas flipY corrected). First-person WASD controls with pointer lock. Phased delivery: deterministic terrain first, then camera modes, then blueprint system. Start 64x64, expansion tokens to 128x128 cap. Chunk-based loading.',

  details:`<div class="modal-section"><div class="modal-section-title">Purpose</div><p>THE flagship differentiator: Minecraft-style voxel colony surfaces on every planet. No other space MMO has this. Transforms colonies from passive income mechanic into active gameplay loop driving daily retention.</p>

<li>2D PixiJS system (fully working) as fallback</li>

<li>Chunk-based loading with Web Workers</li>
<li>Start 64x64, expansion tokens to 128x128 cap</li>
<li>Deterministic terrain gen from planet seed</li>

<li>Phased delivery (do not bundle): Phase 1 -- deterministic terrain + stable spawn + voxel persistence + screenshot baselines. Phase 2 -- camera modes (preview/follow/top-down) backed by explicit SurfaceCameraState model. Phase 3 -- Blueprint mode with PlannedVoxelLayer/BuildFootprint validation for costed, rollback-safe layouts</li>
<li>LOD and day-night cycle only after landmark readability and worker stability stop regressing</li>

<div class="modal-section"><div class="modal-section-title">Risks &amp; Mitigations</div><ul>
